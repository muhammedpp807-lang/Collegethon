<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>EduPortal Pro | Complete Student Management</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
    }

    :root {
      --bg-primary: #f0f4ff;
      --bg-secondary: #ffffff;
      --bg-tertiary: #f7fafc;
      --text-primary: #1a202c;
      --text-secondary: #4a5568;
      --text-muted: #718096;
      --border-color: #e2e8f0;
      --shadow-sm: 0 2px 4px rgba(0,0,0,0.04);
      --shadow-md: 0 10px 30px rgba(0,0,0,0.1);
      --shadow-lg: 0 20px 60px rgba(0,0,0,0.15);
      --shadow-glow: 0 0 40px rgba(102, 126, 234, 0.2);
      --gradient-primary: linear-gradient(135deg, #667eea, #764ba2);
      --gradient-secondary: linear-gradient(135deg, #f093fb, #f5576c);
      --gradient-success: linear-gradient(135deg, #48bb78, #38a169);
      --gradient-gold: linear-gradient(135deg, #f6e05e, #ecc94b);
      --gradient-danger: linear-gradient(135deg, #fc8181, #f56565);
      --glass-bg: rgba(255, 255, 255, 0.95);
      --glass-border: rgba(255, 255, 255, 0.3);
      --card-bg: #ffffff;
      --input-bg: rgba(255, 255, 255, 0.8);
      --header-bg: linear-gradient(135deg, #1a202c, #2d3748);
      --sidebar-bg: linear-gradient(180deg, rgba(247,250,252,0.95) 0%, rgba(237,242,247,0.95) 100%);
      --table-header: linear-gradient(135deg, #2d3748, #1a202c);
      --editable-bg: #fffaf0;
      --stats-bg: linear-gradient(135deg, #ebf4ff, #e8eeff);
      --stats-bg2: linear-gradient(135deg, #fed7d7, #fecaca);
      --hover-row: linear-gradient(90deg, #f7fafc, #edf2ff);
      --modal-overlay: rgba(0,0,0,0.5);
      --glow-color-1: rgba(102, 126, 234, 0.3);
      --glow-color-2: rgba(118, 75, 162, 0.3);
      --glow-color-3: rgba(245, 87, 108, 0.3);
      --achievement-bg: #fefce8;
      --achievement-border: #f6e05e;
      --fine-bg: #fed7d7;
      --fine-border: #fc8181;
    }

    [data-theme="dark"] {
      --bg-primary: #0f1119;
      --bg-secondary: #1a1d2e;
      --bg-tertiary: #252836;
      --text-primary: #e2e8f0;
      --text-secondary: #a0aec0;
      --text-muted: #718096;
      --border-color: #2d3748;
      --shadow-sm: 0 2px 4px rgba(0,0,0,0.3);
      --shadow-md: 0 10px 30px rgba(0,0,0,0.4);
      --shadow-lg: 0 20px 60px rgba(0,0,0,0.5);
      --shadow-glow: 0 0 60px rgba(102, 126, 234, 0.4);
      --glass-bg: rgba(26, 29, 46, 0.95);
      --glass-border: rgba(255, 255, 255, 0.1);
      --card-bg: #1a1d2e;
      --input-bg: rgba(37, 40, 54, 0.8);
      --header-bg: linear-gradient(135deg, #0f1119, #1a1d2e);
      --sidebar-bg: linear-gradient(180deg, rgba(26,29,46,0.95) 0%, rgba(37,40,54,0.95) 100%);
      --table-header: linear-gradient(135deg, #2d3748, #1a202c);
      --editable-bg: #2d3748;
      --stats-bg: linear-gradient(135deg, #1a1d2e, #252836);
      --stats-bg2: linear-gradient(135deg, #2d1f1f, #3d2a2a);
      --hover-row: linear-gradient(90deg, #252836, #1a1d2e);
      --modal-overlay: rgba(0,0,0,0.8);
      --glow-color-1: rgba(102, 126, 234, 0.5);
      --glow-color-2: rgba(118, 75, 162, 0.5);
      --glow-color-3: rgba(245, 87, 108, 0.5);
      --achievement-bg: #2d2a1a;
      --achievement-border: #f6e05e;
      --fine-bg: #3d2a2a;
      --fine-border: #fc8181;
    }

    body { background: var(--bg-primary); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 1.5rem; position: relative; overflow-x: hidden; }
    body::before { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 20% 50%, var(--glow-color-1) 0%, transparent 50%), radial-gradient(circle at 80% 20%, var(--glow-color-2) 0%, transparent 50%), radial-gradient(circle at 50% 80%, var(--glow-color-3) 0%, transparent 50%); animation: bgPulse 8s ease-in-out infinite alternate; pointer-events: none; z-index: 0; }
    @keyframes bgPulse { 0% { opacity: 0.3; transform: scale(1); } 100% { opacity: 0.6; transform: scale(1.1); } }
    
    .app-container { max-width: 1400px; width: 100%; background: var(--glass-bg); backdrop-filter: blur(20px); border-radius: 2rem; box-shadow: var(--shadow-lg), var(--shadow-glow); overflow: hidden; display: flex; flex-direction: column; position: relative; z-index: 1; border: 1px solid var(--glass-border); }

    /* Movable Floating Theme Toggle */
    .movable-theme-toggle {
      position: fixed; z-index: 9999; cursor: grab; background: var(--glass-bg); backdrop-filter: blur(16px); border-radius: 3rem; padding: 0.4rem; display: flex; gap: 0.3rem; box-shadow: var(--shadow-lg), 0 0 20px var(--glow-color-1); border: 1px solid var(--glass-border); user-select: none;
    }
    .movable-theme-toggle:active { cursor: grabbing; }
    .theme-btn-move { padding: 0.5rem 1rem; border: none; border-radius: 2rem; cursor: pointer; font-weight: 600; background: transparent; color: var(--text-secondary); transition: all 0.2s; }
    .theme-btn-move.active { background: var(--gradient-primary); color: white; box-shadow: 0 0 15px var(--glow-color-1); }
    .drag-handle { font-size: 1.2rem; padding: 0 0.3rem; cursor: grab; display: flex; align-items: center; color: var(--text-muted); }
    .drag-handle:active { cursor: grabbing; }

    .login-screen { display: flex; justify-content: center; align-items: center; min-height: 500px; padding: 2rem; background: var(--bg-primary); animation: slideInUp 0.6s ease-out; }
    @keyframes slideInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    .login-card { background: var(--glass-bg); backdrop-filter: blur(20px); padding: 2.5rem; border-radius: 1.5rem; box-shadow: var(--shadow-md), 0 0 60px var(--glow-color-1); width: 100%; max-width: 400px; border: 1px solid var(--glass-border); }
    .login-card h2 { background: var(--gradient-primary); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 1.5rem; font-size: 2rem; }
    .input-group { margin-bottom: 1.2rem; }
    .input-group label { display: block; font-weight: 600; color: var(--text-secondary); margin-bottom: 0.4rem; font-size: 0.9rem; }
    .input-group input, .input-group select, .input-group textarea { width: 100%; padding: 0.8rem 1rem; border: 2px solid var(--border-color); border-radius: 0.8rem; font-size: 1rem; background: var(--input-bg); color: var(--text-primary); }
    .input-group input:focus { outline: none; border-color: #667eea; box-shadow: 0 0 20px var(--glow-color-1); transform: translateY(-2px); }
    .login-btn, .btn { background: var(--gradient-primary); border: none; color: white; padding: 0.8rem 1.5rem; border-radius: 2rem; font-weight: 600; cursor: pointer; position: relative; overflow: hidden; transition: transform 0.2s, box-shadow 0.2s; }
    .login-btn:hover, .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px var(--glow-color-1); }
    .btn-outline { background: transparent; border: 2px solid #667eea; color: #667eea; }
    .btn-outline:hover { background: rgba(102,126,234,0.1); transform: translateY(-2px); }
    .btn-danger { background: var(--gradient-danger); }
    header { background: var(--header-bg); color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; position: relative; overflow: hidden; }
    header h1 { font-weight: 600; font-size: 1.6rem; z-index: 1; text-shadow: 0 0 20px rgba(255,255,255,0.3); }
    .user-info { display: flex; align-items: center; gap: 1rem; z-index: 1; }
    .logout-btn { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 0.5rem 1.2rem; border-radius: 2rem; cursor: pointer; font-weight: 600; backdrop-filter: blur(10px); transition: all 0.2s; }
    .logout-btn:hover { background: rgba(255,255,255,0.3); transform: translateY(-2px); }
    .main-layout { display: flex; min-height: 550px; }
    .sidebar { width: 280px; background: var(--sidebar-bg); backdrop-filter: blur(10px); padding: 1.5rem 1rem; border-right: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 0.8rem; overflow-y: auto; max-height: calc(100vh - 80px); }
    .class-item { background: var(--card-bg); padding: 0.9rem 1rem; border-radius: 1rem; cursor: pointer; font-weight: 500; color: var(--text-primary); box-shadow: var(--shadow-sm); transition: all 0.2s; border: 2px solid transparent; display: flex; justify-content: space-between; align-items: center; }
    .class-item:hover { border-color: #667eea; transform: translateX(5px); box-shadow: 0 5px 20px var(--glow-color-1); }
    .class-item.active-class { border-color: #667eea; background: linear-gradient(135deg, rgba(102,126,234,0.1), rgba(118,75,162,0.1)); font-weight: 700; }
    .class-name { flex: 1; cursor: pointer; }
    .class-actions { display: flex; gap: 0.3rem; }
    .icon-btn { background: transparent; border: none; cursor: pointer; font-size: 1rem; padding: 0.2rem 0.4rem; border-radius: 0.5rem; color: var(--text-muted); transition: all 0.2s; }
    .icon-btn:hover { background: var(--bg-tertiary); color: #667eea; transform: scale(1.1); }
    .content-panel { flex: 1; padding: 1.5rem 2rem; overflow-y: auto; background: var(--bg-secondary); color: var(--text-primary); max-height: calc(100vh - 80px); overflow-y: auto; }
    .section-title { font-size: 1.4rem; font-weight: 700; background: var(--gradient-primary); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 1.2rem; border-bottom: 2px solid var(--border-color); padding-bottom: 0.5rem; }
    table { width: 100%; border-collapse: collapse; background: var(--card-bg); border-radius: 0.8rem; font-size: 0.9rem; box-shadow: var(--shadow-md); overflow: hidden; }
    th { background: var(--table-header); color: white; padding: 0.8rem; text-align: left; }
    td, th { padding: 0.7rem 0.8rem; border-bottom: 1px solid var(--border-color); }
    tr:hover { background: var(--hover-row); }
    .editable { background: var(--editable-bg); border: 1px dashed var(--border-color); padding: 0.3rem 0.5rem; border-radius: 6px; display: inline-block; cursor: text; min-width: 60px; }
    .editable:focus { outline: none; border-color: #667eea; background: var(--card-bg); }
    .profile-container { display: grid; grid-template-columns: 300px 1fr; gap: 2rem; margin-bottom: 2rem; }
    .profile-sidebar { background: var(--card-bg); border-radius: 1.5rem; padding: 2rem; text-align: center; box-shadow: var(--shadow-md); }
    .profile-pic { width: 150px; height: 150px; border-radius: 50%; object-fit: cover; border: 4px solid #667eea; margin-bottom: 1rem; cursor: pointer; transition: transform 0.2s; }
    .profile-pic:hover { transform: scale(1.05); }
    .profile-pic-placeholder { width: 150px; height: 150px; border-radius: 50%; background: var(--gradient-primary); display: flex; align-items: center; justify-content: center; font-size: 3rem; color: white; margin: 0 auto 1rem; border: 4px solid #667eea; cursor: pointer; transition: transform 0.2s; }
    .profile-pic-placeholder:hover { transform: scale(1.05); }
    .profile-details { background: var(--card-bg); border-radius: 1.5rem; padding: 2rem; box-shadow: var(--shadow-md); }
    .detail-row { display: flex; justify-content: space-between; padding: 0.8rem 0; border-bottom: 1px solid var(--border-color); }
    .detail-label { font-weight: 600; color: var(--text-secondary); }
    .achievement-card { background: var(--achievement-bg); border: 2px solid var(--achievement-border); border-radius: 1rem; padding: 1rem; margin: 0.5rem 0; display: flex; align-items: center; gap: 1rem; transition: transform 0.2s; }
    .achievement-card:hover { transform: translateX(5px); }
    .fine-card { background: var(--fine-bg); border: 2px solid var(--fine-border); border-radius: 1rem; padding: 1rem; margin: 0.5rem 0; display: flex; align-items: center; gap: 1rem; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin: 1.5rem 0; }
    .stat-card { background: var(--stats-bg); padding: 1.2rem; border-radius: 1rem; text-align: center; transition: transform 0.2s; cursor: pointer; }
    .stat-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-md); }
    .stat-value { font-size: 2rem; font-weight: 700; background: var(--gradient-primary); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--modal-overlay); backdrop-filter: blur(10px); display: flex; justify-content: center; align-items: center; z-index: 1000; animation: fadeIn 0.2s ease-out; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal-content { background: var(--card-bg); padding: 2rem; border-radius: 1.5rem; width: 90%; max-width: 500px; color: var(--text-primary); animation: slideInUp 0.3s ease-out; max-height: 80vh; overflow-y: auto; }
    .score-badge { background: var(--gradient-gold); color: #1a202c; font-weight: bold; padding: 0.2rem 0.6rem; border-radius: 2rem; font-size: 0.8rem; margin-left: 0.5rem; }
    .fine-badge { background: var(--gradient-danger); color: white; font-weight: bold; padding: 0.2rem 0.6rem; border-radius: 2rem; font-size: 0.8rem; margin-left: 0.5rem; }
    .complaint-item { background: var(--bg-tertiary); padding: 0.8rem; border-radius: 0.8rem; margin: 0.5rem 0; border-left: 4px solid #667eea; }
    @media (max-width: 750px) { .main-layout { flex-direction: column; } .sidebar { width: 100%; max-height: 300px; } .profile-container { grid-template-columns: 1fr; } .content-panel { padding: 1rem; } }
  </style>
</head>
<body>
<div class="app-container" id="appContainer"></div>

<script>
  // Movable Theme Toggle
  function initMovableThemeToggle() {
    if (document.querySelector('.movable-theme-toggle')) return;
    const toggleDiv = document.createElement('div');
    toggleDiv.className = 'movable-theme-toggle';
    toggleDiv.innerHTML = `<span class="drag-handle">⋮⋮</span><button class="theme-btn-move" data-theme-move="light">☀️ Light</button><button class="theme-btn-move" data-theme-move="dark">🌙 Dark</button>`;
    document.body.appendChild(toggleDiv);
    let posX = localStorage.getItem('themeToggleX'), posY = localStorage.getItem('themeToggleY');
    if (posX && posY) { toggleDiv.style.left = posX + 'px'; toggleDiv.style.top = posY + 'px'; toggleDiv.style.right = 'auto'; toggleDiv.style.bottom = 'auto'; }
    else { toggleDiv.style.left = '20px'; toggleDiv.style.top = '100px'; toggleDiv.style.right = 'auto'; toggleDiv.style.bottom = 'auto'; }
    const savedTheme = localStorage.getItem('eduportal_theme') || 'light';
    setThemeGlobal(savedTheme);
    function setThemeGlobal(theme) { document.documentElement.setAttribute('data-theme', theme); updateButtons(theme); localStorage.setItem('eduportal_theme', theme); }
    function updateButtons(theme) { toggleDiv.querySelectorAll('.theme-btn-move').forEach(btn => { btn.classList.toggle('active', btn.dataset.themeMove === theme); }); }
    toggleDiv.querySelectorAll('.theme-btn-move').forEach(btn => btn.addEventListener('click', (e) => { e.stopPropagation(); setThemeGlobal(btn.dataset.themeMove); }));
    let isDragging = false, offsetX, offsetY;
    const handle = toggleDiv.querySelector('.drag-handle');
    handle.addEventListener('mousedown', (e) => { e.preventDefault(); isDragging = true; const rect = toggleDiv.getBoundingClientRect(); offsetX = e.clientX - rect.left; offsetY = e.clientY - rect.top; toggleDiv.style.cursor = 'grabbing'; });
    window.addEventListener('mousemove', (e) => { if (!isDragging) return; let left = e.clientX - offsetX, top = e.clientY - offsetY; left = Math.min(window.innerWidth - toggleDiv.offsetWidth - 10, Math.max(10, left)); top = Math.min(window.innerHeight - toggleDiv.offsetHeight - 10, Math.max(10, top)); toggleDiv.style.left = left + 'px'; toggleDiv.style.top = top + 'px'; toggleDiv.style.right = 'auto'; });
    window.addEventListener('mouseup', () => { if (isDragging) { isDragging = false; toggleDiv.style.cursor = 'grab'; const left = parseInt(toggleDiv.style.left), top = parseInt(toggleDiv.style.top); if (!isNaN(left) && !isNaN(top)) { localStorage.setItem('themeToggleX', left); localStorage.setItem('themeToggleY', top); } } });
    handle.style.cursor = 'grab';
    window.setTheme = setThemeGlobal;
  }

  // Main App
  (function() {
    const STORAGE_KEY = 'eduportal_pro_v5';
    const defaultData = {
      admin: { username: 'admin', password: 'admin123' },
      classes: [{ id: 'c1', name: 'Computer Science 101' }, { id: 'c2', name: 'Mathematics 202' }, { id: 'c3', name: 'Physics Lab' }],
      students: [
        { id: 's1', name: 'Alice Johnson', username: 'alice', password: 'pass123', classId: 'c1', attendance: 45, fine: 0, complaints: [], email: 'alice@example.com', phone: '+1 234-567-8901', address: '123 College St', bio: 'CS enthusiast', profilePic: '', achievements: [{ title: "Dean's List 2024", date: '2024-05-15', icon: '🏆', score: 10 }, { title: 'Hackathon Winner', date: '2024-03-20', icon: '💻', score: 15 }], totalScore: 25 },
        { id: 's2', name: 'Bob Williams', username: 'bob', password: 'pass123', classId: 'c1', attendance: 38, fine: 25, complaints: ['WiFi not working'], email: 'bob@example.com', phone: '+1 234-567-8902', address: '456 University Ave', bio: 'Developer', profilePic: '', achievements: [{ title: 'Perfect Attendance', date: '2024-04-10', icon: '⭐', score: 5 }], totalScore: 5 },
        { id: 's3', name: 'Charlie Brown', username: 'charlie', password: 'pass123', classId: 'c2', attendance: 42, fine: 10, complaints: [], email: 'charlie@example.com', phone: '+1 234-567-8903', address: '789 Campus Dr', bio: 'Math major', profilePic: '', achievements: [], totalScore: 0 },
        { id: 's4', name: 'Diana Lee', username: 'diana', password: 'pass123', classId: 'c2', attendance: 48, fine: 0, complaints: ['Lab equipment broken'], email: 'diana@example.com', phone: '+1 234-567-8904', address: '321 Research Blvd', bio: 'Physicist', profilePic: '', achievements: [{ title: 'Research Publication', date: '2024-06-01', icon: '📄', score: 20 }], totalScore: 20 },
        { id: 's5', name: 'Eve Martinez', username: 'eve', password: 'pass123', classId: 'c3', attendance: 30, fine: 40, complaints: [], email: 'eve@example.com', phone: '+1 234-567-8905', address: '654 Lab Lane', bio: 'Experimenter', profilePic: '', achievements: [], totalScore: 0 },
        { id: 's6', name: 'Frank Chen', username: 'frank', password: 'pass123', classId: 'c3', attendance: 41, fine: 5, complaints: ['Noise complaint'], email: 'frank@example.com', phone: '+1 234-567-8906', address: '987 Science Park', bio: 'Quantum researcher', profilePic: '', achievements: [{ title: 'Best Paper Award', date: '2024-02-28', icon: '🥇', score: 25 }], totalScore: 25 }
      ]
    };
    function loadData() { const stored = localStorage.getItem(STORAGE_KEY); return stored ? JSON.parse(stored) : JSON.parse(JSON.stringify(defaultData)); }
    function saveData(data) { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
    let appData = loadData();
    let currentUser = null;
    let selectedClassId = appData.classes.length > 0 ? appData.classes[0].id : null;
    let showAddStudentModal = false, editingPasswordFor = null, editingProfileFor = null;
    const appContainer = document.getElementById('appContainer');
    function escapeHtml(text) { return String(text).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
    function getStudentsByClass(classId) { return appData.students.filter(s => s.classId === classId); }
    function updateStudent(studentId, newValues) { 
      const index = appData.students.findIndex(s => s.id === studentId); 
      if (index !== -1) { 
        appData.students[index] = { ...appData.students[index], ...newValues }; 
        saveData(appData);
        // Force refresh if viewing same student
        if (currentUser?.type === 'student' && currentUser.studentId === studentId) {
          renderStudentProfile();
        }
        return true;
      }
      return false;
    }
    function generateStudentId() { return 's' + Date.now() + '_' + Math.random().toString(36).substr(2, 6); }
    function generateClassId() { return 'c' + Date.now() + '_' + Math.random().toString(36).substr(2, 4); }
    
    function addAchievementToStudent(studentId, achievement) {
      const student = appData.students.find(s => s.id === studentId);
      if (student) {
        if (!student.achievements) student.achievements = [];
        const baseScore = achievement.score || 10;
        const newAchieve = { ...achievement, score: baseScore, date: achievement.date || new Date().toISOString().split('T')[0] };
        student.achievements.push(newAchieve);
        student.totalScore = (student.totalScore || 0) + baseScore;
        saveData(appData);
        if (currentUser?.type === 'student' && currentUser.studentId === studentId) {
          renderStudentProfile();
        }
        return true;
      }
      return false;
    }

    // Class CRUD
    function addClass(name) { const newId = generateClassId(); appData.classes.push({ id: newId, name: name.trim() }); saveData(appData); if (appData.classes.length === 1) selectedClassId = newId; renderClassList(); renderAdminPanel(); showNotification(`Class "${name}" added`); }
    function updateClass(classId, newName) { const cls = appData.classes.find(c => c.id === classId); if (cls) { cls.name = newName.trim(); saveData(appData); renderClassList(); renderAdminPanel(); showNotification('Class updated'); } }
    function deleteClass(classId) { if (appData.classes.length <= 1) { showNotification('Cannot delete last class', true); return; } const studentsInClass = appData.students.filter(s => s.classId === classId); if (studentsInClass.length > 0 && !confirm(`This class has ${studentsInClass.length} student(s). Delete anyway? They will become unassigned.`)) return; appData.classes = appData.classes.filter(c => c.id !== classId); appData.students.forEach(s => { if (s.classId === classId) s.classId = null; }); if (selectedClassId === classId) selectedClassId = appData.classes[0]?.id || null; saveData(appData); renderClassList(); renderAdminPanel(); showNotification('Class deleted'); }

    function renderLoginScreen(role) {
      const isAdmin = role === 'admin';
      appContainer.innerHTML = `<div class="login-screen"><div class="login-card"><h2>${isAdmin ? '🔑 Admin Login' : '🎓 Student Login'}</h2><div class="input-group"><label>Username</label><input type="text" id="loginUsername" placeholder="Enter username"></div><div class="input-group"><label>Password</label><input type="password" id="loginPassword" placeholder="Enter password"></div><button class="login-btn" id="loginBtn" style="width:100%">✨ Login</button><div id="loginError" style="color:#e53e3e;margin-top:0.5rem;text-align:center;"></div><div style="margin-top:1rem;text-align:center;"><button class="btn-outline" id="switchLoginBtn">Switch to ${isAdmin ? 'Student' : 'Admin'} Login</button></div></div></div>`;
      document.getElementById('loginBtn').onclick = () => { const u = document.getElementById('loginUsername').value.trim(), p = document.getElementById('loginPassword').value.trim(); if (!u || !p) { document.getElementById('loginError').textContent = 'Fill all fields'; return; } if (isAdmin) { if (u === appData.admin.username && p === appData.admin.password) { currentUser = { type: 'admin' }; renderDashboard(); } else { document.getElementById('loginError').textContent = 'Invalid admin credentials'; } } else { const s = appData.students.find(st => st.username === u && st.password === p); if (s) { currentUser = { type: 'student', studentId: s.id }; renderDashboard(); } else { document.getElementById('loginError').textContent = 'Invalid student credentials'; } } };
      document.getElementById('switchLoginBtn').onclick = () => renderLoginScreen(isAdmin ? 'student' : 'admin');
    }
    
    function renderDashboard() { 
      if (!currentUser) { renderLoginScreen('admin'); return; } 
      const isAdmin = currentUser.type === 'admin'; 
      appContainer.innerHTML = `<header><h1>✨ EduPortal Pro | Complete Student Management</h1><div class="user-info"><span>👤 ${isAdmin ? 'Administrator' : (getCurrentStudent()?.name || 'Student')}</span><button class="logout-btn" id="logoutBtn">🚪 Logout</button></div></header><div class="main-layout">${isAdmin ? `<div class="sidebar"><div style="display:flex; justify-content:space-between; margin-bottom:0.5rem;"><strong>📚 Classes</strong><button class="icon-btn" id="addClassBtn" title="Add Class">➕</button></div><div id="classListContainer"></div><hr style="margin:1rem 0"><button class="btn" id="addStudentBtn" style="width:100%">➕ Add Student</button></div>` : ''}<div class="content-panel" id="contentPanel"></div></div><div id="modalContainer"></div>`; 
      document.getElementById('logoutBtn').onclick = () => { currentUser = null; renderLoginScreen('admin'); }; 
      if (isAdmin) { 
        document.getElementById('addClassBtn')?.addEventListener('click', () => renderAddClassModal()); 
        document.getElementById('addStudentBtn')?.addEventListener('click', () => { showAddStudentModal = true; renderAddStudentModal(); }); 
        renderClassList(); 
        renderAdminPanel(); 
      } else { 
        renderStudentProfile(); 
      } 
    }
    function getCurrentStudent() { return currentUser?.type === 'student' ? appData.students.find(s => s.id === currentUser.studentId) : null; }
    
    function renderClassList() { 
      const container = document.getElementById('classListContainer'); 
      if (!container) return; 
      container.innerHTML = ''; 
      appData.classes.forEach(cls => { 
        const div = document.createElement('div'); 
        div.className = `class-item ${cls.id === selectedClassId ? 'active-class' : ''}`; 
        div.innerHTML = `<span class="class-name">${escapeHtml(cls.name)}</span><div class="class-actions"><button class="icon-btn edit-class" data-id="${cls.id}" title="Edit">✏️</button><button class="icon-btn delete-class" data-id="${cls.id}" title="Delete">🗑️</button></div>`; 
        div.querySelector('.class-name').addEventListener('click', () => { selectedClassId = cls.id; renderClassList(); renderAdminPanel(); }); 
        div.querySelector('.edit-class').addEventListener('click', (e) => { e.stopPropagation(); renderEditClassModal(cls.id, cls.name); }); 
        div.querySelector('.delete-class').addEventListener('click', (e) => { e.stopPropagation(); deleteClass(cls.id); }); 
        container.appendChild(div); 
      }); 
    }
    
    function renderAddClassModal() { 
      const modalContainer = document.getElementById('modalContainer'); 
      if (!modalContainer) return; 
      modalContainer.innerHTML = `<div class="modal"><div class="modal-content"><h2>➕ Add New Class</h2><div class="input-group"><label>Class Name</label><input type="text" id="newClassName" placeholder="e.g., Data Science" autofocus></div><div style="display:flex;gap:1rem;margin-top:1rem;"><button class="btn" id="confirmAddClass">Create</button><button class="btn-outline" id="cancelAddClass">Cancel</button></div></div></div>`; 
      document.getElementById('confirmAddClass').onclick = () => { const name = document.getElementById('newClassName').value.trim(); if (name) { addClass(name); modalContainer.innerHTML = ''; } else alert('Enter class name'); }; 
      document.getElementById('cancelAddClass').onclick = () => modalContainer.innerHTML = ''; 
    }
    function renderEditClassModal(classId, currentName) { 
      const modalContainer = document.getElementById('modalContainer'); 
      modalContainer.innerHTML = `<div class="modal"><div class="modal-content"><h2>✏️ Edit Class</h2><div class="input-group"><label>Class Name</label><input type="text" id="editClassName" value="${escapeHtml(currentName)}" autofocus></div><div style="display:flex;gap:1rem;"><button class="btn" id="saveEditClass">Save</button><button class="btn-outline" id="cancelEditClass">Cancel</button></div></div></div>`; 
      document.getElementById('saveEditClass').onclick = () => { const newName = document.getElementById('editClassName').value.trim(); if (newName) { updateClass(classId, newName); modalContainer.innerHTML = ''; } else alert('Name required'); }; 
      document.getElementById('cancelEditClass').onclick = () => modalContainer.innerHTML = ''; 
    }
    
    function renderAdminPanel() { 
      const panel = document.getElementById('contentPanel'); 
      if (!panel) return; 
      const selectedClass = appData.classes.find(c => c.id === selectedClassId); 
      const classStudents = getStudentsByClass(selectedClassId); 
      if (!selectedClass && appData.classes.length) { selectedClassId = appData.classes[0].id; renderAdminPanel(); return; } 
      let html = `<div class="section-title">📊 Class: ${selectedClass ? escapeHtml(selectedClass.name) : 'None'}</div>${!selectedClass ? '<p>No class selected. Create a class first.</p>' : `<div style="overflow-x:auto;"><table><thead><tr><th>Student</th><th>Username</th><th>Attendance</th><th>Fine ($)</th><th>🏆 Score</th><th>Actions</th></tr></thead><tbody>${classStudents.map(s => `<tr data-student-id="${s.id}"><td><strong>${escapeHtml(s.name)}</strong><br><small>${escapeHtml(s.email || 'no email')}</small></td><td>${escapeHtml(s.username)}</td><td><span class="editable" data-field="attendance" data-id="${s.id}">${s.attendance}</span> days</td><td>$<span class="editable" data-field="fine" data-id="${s.id}">${s.fine}</span></td><td><span class="score-badge">🏅 ${s.totalScore || 0} pts</span></td><td><button class="btn save-row-btn" data-id="${s.id}" style="padding:0.3rem 0.8rem;">💾 Save</button> <button class="btn-outline edit-pass-btn" data-id="${s.id}" style="padding:0.3rem 0.8rem;">🔑 Pass</button> <button class="btn-outline view-profile-btn" data-id="${s.id}" style="padding:0.3rem 0.8rem;">👤 Profile</button> <button class="btn-outline add-achieve-admin" data-id="${s.id}" style="padding:0.3rem 0.8rem;">🏆 Add</button></td></tr>`).join('')}</tbody></table></div><button class="btn" id="refreshAdminBtn" style="margin-top:1rem;">🔄 Refresh</button>`}</div>`; 
      panel.innerHTML = html; 
      if (!selectedClass) return; 
      document.querySelectorAll('.editable').forEach(span => { span.contentEditable = 'true'; span.addEventListener('blur', function() { let val = this.innerText.trim(); if (this.dataset.field === 'attendance') { let n = parseInt(val); if(isNaN(n)) n=0; this.innerText = Math.max(0,n); } else if (this.dataset.field === 'fine') { let n = parseFloat(val); if(isNaN(n)) n=0; this.innerText = Math.max(0,n).toFixed(0); } }); }); 
      document.querySelectorAll('.save-row-btn').forEach(btn => btn.addEventListener('click', function() { const sid = this.dataset.id; const row = document.querySelector(`tr[data-student-id="${sid}"]`); const att = parseInt(row.querySelector('[data-field="attendance"]').innerText) || 0; const fine = parseFloat(row.querySelector('[data-field="fine"]').innerText) || 0; updateStudent(sid, { attendance: Math.max(0,att), fine: Math.max(0,fine) }); this.textContent = '✅ Saved!'; setTimeout(() => this.textContent = '💾 Save', 1200); renderAdminPanel(); })); 
      document.querySelectorAll('.edit-pass-btn').forEach(btn => btn.addEventListener('click', function() { editingPasswordFor = this.dataset.id; renderPasswordEditModal(false); })); 
      document.querySelectorAll('.view-profile-btn').forEach(btn => btn.addEventListener('click', function() { const student = appData.students.find(s => s.id === this.dataset.id); if (student) renderStudentProfileView(student); })); 
      document.querySelectorAll('.add-achieve-admin').forEach(btn => btn.addEventListener('click', function() { renderAdminAddAchievementModal(this.dataset.id); })); 
      document.getElementById('refreshAdminBtn')?.addEventListener('click', () => renderAdminPanel()); 
    }
    
    function renderAdminAddAchievementModal(studentId) { 
      const modalContainer = document.getElementById('modalContainer'); 
      modalContainer.innerHTML = `<div class="modal"><div class="modal-content"><h2>🏆 Add Achievement</h2><div class="input-group"><label>Title</label><input type="text" id="adminAchieveTitle" placeholder="e.g., Science Fair Winner" autofocus></div><div class="input-group"><label>Icon (emoji)</label><input type="text" id="adminAchieveIcon" value="🏅" maxlength="2"></div><div class="input-group"><label>Score Points (1-50)</label><input type="number" id="adminAchieveScore" value="10" min="1" max="50"></div><div class="input-group"><label>Date</label><input type="date" id="adminAchieveDate" value="${new Date().toISOString().split('T')[0]}"></div><div style="display:flex;gap:1rem;"><button class="btn" id="adminConfirmAchieveBtn">Add & Award</button><button class="btn-outline" id="cancelAdminAchieveBtn">Cancel</button></div></div></div>`; 
      document.getElementById('adminConfirmAchieveBtn').onclick = () => { const title = document.getElementById('adminAchieveTitle').value.trim(); if (!title) { alert('Title required'); return; } const icon = document.getElementById('adminAchieveIcon').value.trim() || '🏅'; const score = parseInt(document.getElementById('adminAchieveScore').value) || 10; const date = document.getElementById('adminAchieveDate').value; const student = appData.students.find(s => s.id === studentId); if (student) { addAchievementToStudent(studentId, { title, icon, score, date }); showNotification(`✅ +${score} points awarded to ${student.name}`); modalContainer.innerHTML = ''; if (currentUser.type === 'admin') renderAdminPanel(); else renderStudentProfile(); } }; 
      document.getElementById('cancelAdminAchieveBtn').onclick = () => modalContainer.innerHTML = ''; 
    }
    
    function renderStudentProfile() { 
      const panel = document.getElementById('contentPanel'); 
      const student = getCurrentStudent(); 
      if (!student || !panel) return; 
      panel.innerHTML = buildProfileHTML(student, true); 
      attachProfileEvents(student, true); 
    }
    
    function renderStudentProfileView(student) { 
      const panel = document.getElementById('contentPanel'); 
      panel.innerHTML = buildProfileHTML(student, false); 
      attachProfileEvents(student, false); 
    }
    
    function buildProfileHTML(student, isOwner) { 
      const studentClass = appData.classes.find(c => c.id === student.classId); 
      const initials = student.name.split(' ').map(n => n[0]).join('').toUpperCase(); 
      return `<div class="profile-container"><div class="profile-sidebar">${student.profilePic ? `<img src="${student.profilePic}" class="profile-pic" id="profilePicImg" alt="Profile">` : `<div class="profile-pic-placeholder" id="profilePicPlaceholder">${initials}</div>`}${isOwner ? `<button class="btn-outline" id="changePicBtn" style="margin-top:0.5rem;">📷 Change Photo</button>` : ''}<h2 style="margin-top:0.5rem;">${escapeHtml(student.name)}</h2><p style="color:var(--text-muted);">${escapeHtml(student.username)}</p>${isOwner ? `<button class="btn" id="editProfileBtn" style="margin-top:0.5rem;">✏️ Edit Profile</button>` : ''}</div><div class="profile-details"><div class="section-title">📋 Personal Information</div><div class="detail-row"><span class="detail-label">Email</span><span>${escapeHtml(student.email || '—')}</span></div><div class="detail-row"><span class="detail-label">Phone</span><span>${escapeHtml(student.phone || '—')}</span></div><div class="detail-row"><span class="detail-label">Address</span><span>${escapeHtml(student.address || '—')}</span></div><div class="detail-row"><span class="detail-label">Class</span><span>${studentClass ? escapeHtml(studentClass.name) : 'Unassigned'}</span></div><div class="detail-row"><span class="detail-label">Bio</span><span>${escapeHtml(student.bio || 'No bio yet')}</span></div></div></div><div class="stats-grid"><div class="stat-card"><strong>📊 Attendance</strong><br><span class="stat-value">${student.attendance} days</span></div><div class="stat-card" style="background:var(--stats-bg2);"><strong>💰 Current Fine</strong><br><span style="font-size:2rem;font-weight:700;color:#e53e3e;">$${student.fine}</span><br><small>Pay to clear fine</small></div><div class="stat-card"><strong>🏆 Total Score</strong><br><span class="stat-value">${student.totalScore || 0}</span></div></div><div class="section-title">🏆 Achievements & Awards</div><div id="achievementsList">${(student.achievements || []).length === 0 ? '<p style="color:var(--text-muted);">No achievements yet. Add some!</p>' : (student.achievements || []).map(a => `<div class="achievement-card"><span style="font-size:2rem;">${a.icon}</span><div class="achievement-info"><strong>${escapeHtml(a.title)}</strong> <span class="score-badge">+${a.score} pts</span><br><small>${a.date}</small></div></div>`).join('')}</div>${isOwner ? `<button class="btn" id="addAchievementBtn" style="margin-top:1rem;">➕ Add Achievement (Earn Points)</button>` : ''}<div class="section-title" style="margin-top:2rem;">📝 My Complaints</div><div id="complaintsList">${student.complaints.length === 0 ? '<p style="color:var(--text-muted);">No complaints filed</p>' : student.complaints.map((c, idx) => `<div class="complaint-item">📌 ${escapeHtml(c)}</div>`).join('')}</div>${isOwner ? `<div style="margin-top:1rem;"><textarea id="newComplaintText" rows="3" placeholder="Describe your issue..." style="width:100%;padding:0.8rem;border-radius:0.8rem;border:2px solid var(--border-color);background:var(--input-bg);color:var(--text-primary);"></textarea><button class="btn" id="submitComplaintBtn" style="margin-top:0.5rem;">📤 Submit Complaint</button></div><button class="btn-outline" id="changePasswordBtn" style="margin-top:1rem;">🔑 Change Password</button>` : ''}`; 
    }
    
    function attachProfileEvents(student, isOwner) { 
      if (!isOwner) return; 
      document.getElementById('changePicBtn')?.addEventListener('click', () => { const inp = document.createElement('input'); inp.type = 'file'; inp.accept = 'image/*'; inp.onchange = (e) => { const f = e.target.files[0]; if (f) { const rd = new FileReader(); rd.onload = (ev) => { updateStudent(student.id, { profilePic: ev.target.result }); renderStudentProfile(); showNotification('Photo updated!'); }; rd.readAsDataURL(f); } }; inp.click(); }); 
      document.getElementById('editProfileBtn')?.addEventListener('click', () => { editingProfileFor = student.id; renderEditProfileModal(); }); 
      document.getElementById('addAchievementBtn')?.addEventListener('click', () => { renderStudentAddAchievementModal(); }); 
      document.getElementById('submitComplaintBtn')?.addEventListener('click', () => { const txt = document.getElementById('newComplaintText')?.value.trim(); if(txt) { student.complaints.push(txt); saveData(appData); renderStudentProfile(); showNotification('✅ Complaint submitted!'); } }); 
      document.getElementById('changePasswordBtn')?.addEventListener('click', () => { editingPasswordFor = student.id; renderPasswordEditModal(true); }); 
    }
    
    function renderStudentAddAchievementModal() { 
      const modalContainer = document.getElementById('modalContainer'); 
      const student = getCurrentStudent(); 
      modalContainer.innerHTML = `<div class="modal"><div class="modal-content"><h2>🏆 Add New Achievement</h2><div class="input-group"><label>Achievement Title</label><input type="text" id="achTitle" placeholder="e.g., Perfect Attendance" autofocus></div><div class="input-group"><label>Icon (emoji)</label><input type="text" id="achIcon" value="🏆" maxlength="2"></div><div class="input-group"><label>Score Points (1-30)</label><input type="number" id="achScore" value="10" min="1" max="30"></div><div class="input-group"><label>Date</label><input type="date" id="achDate" value="${new Date().toISOString().split('T')[0]}"></div><div style="display:flex;gap:1rem;margin-top:1rem;"><button class="btn" id="saveSelfAchieve">💾 Add & Earn Points</button><button class="btn-outline" id="cancelSelf">Cancel</button></div></div></div>`; 
      document.getElementById('saveSelfAchieve').onclick = () => { const title = document.getElementById('achTitle').value.trim(); if(!title) { alert('Please enter achievement title'); return; } addAchievementToStudent(student.id, { title, icon: document.getElementById('achIcon').value, score: parseInt(document.getElementById('achScore').value)||10, date: document.getElementById('achDate').value }); modalContainer.innerHTML = ''; renderStudentProfile(); showNotification('🎉 Achievement added! Points earned!'); }; 
      document.getElementById('cancelSelf').onclick = () => modalContainer.innerHTML = ''; 
    }
    
    function renderEditProfileModal() { 
      const modalContainer = document.getElementById('modalContainer'); 
      const student = appData.students.find(s => s.id === editingProfileFor); 
      modalContainer.innerHTML = `<div class="modal"><div class="modal-content"><h2>✏️ Edit Profile</h2><div class="input-group"><label>Full Name</label><input id="editName" value="${escapeHtml(student.name)}"></div><div class="input-group"><label>Email</label><input id="editEmail" value="${escapeHtml(student.email || '')}"></div><div class="input-group"><label>Phone</label><input id="editPhone" value="${escapeHtml(student.phone || '')}"></div><div class="input-group"><label>Address</label><input id="editAddress" value="${escapeHtml(student.address || '')}"></div><div class="input-group"><label>Bio</label><textarea id="editBio" rows="3">${escapeHtml(student.bio || '')}</textarea></div><div style="display:flex;gap:1rem;"><button class="btn" id="saveProfileEdits">💾 Save Changes</button><button class="btn-outline" id="cancelEdit">Cancel</button></div></div></div>`; 
      document.getElementById('saveProfileEdits').onclick = () => { updateStudent(student.id, { name: document.getElementById('editName').value, email: document.getElementById('editEmail').value, phone: document.getElementById('editPhone').value, address: document.getElementById('editAddress').value, bio: document.getElementById('editBio').value }); modalContainer.innerHTML = ''; editingProfileFor = null; if(currentUser.type === 'admin') renderAdminPanel(); else renderStudentProfile(); showNotification('✅ Profile updated!'); }; 
      document.getElementById('cancelEdit').onclick = () => { modalContainer.innerHTML = ''; editingProfileFor = null; }; 
    }
    
    function renderPasswordEditModal(isSelf) { 
      const modalContainer = document.getElementById('modalContainer'); 
      const student = appData.students.find(s => s.id === editingPasswordFor); 
      modalContainer.innerHTML = `<div class="modal"><div class="modal-content"><h2>🔑 Change Password</h2>${isSelf ? '<div class="input-group"><label>Current Password</label><input type="password" id="currPass" placeholder="Enter current password"></div>' : ''}<div class="input-group"><label>New Password</label><input type="text" id="newPass" placeholder="Enter new password"></div><div style="display:flex;gap:1rem;"><button class="btn" id="savePassBtn">💾 Update Password</button><button class="btn-outline" id="cancelPass">Cancel</button></div><div id="passErr" style="color:#e53e3e;margin-top:0.5rem;"></div></div></div>`; 
      document.getElementById('savePassBtn').onclick = () => { const newP = document.getElementById('newPass').value.trim(); if(!newP) { document.getElementById('passErr').textContent='Enter new password'; return; } if(isSelf && document.getElementById('currPass').value !== student.password) { document.getElementById('passErr').textContent='Current password incorrect'; return; } updateStudent(student.id, { password: newP }); editingPasswordFor = null; modalContainer.innerHTML = ''; showNotification('✅ Password changed successfully!'); if(currentUser.type === 'admin') renderAdminPanel(); else renderStudentProfile(); }; 
      document.getElementById('cancelPass').onclick = () => { modalContainer.innerHTML = ''; editingPasswordFor = null; }; 
    }
    
    function renderAddStudentModal() { 
      const modalContainer = document.getElementById('modalContainer'); 
      modalContainer.innerHTML = `<div class="modal"><div class="modal-content"><h2>➕ Add New Student</h2><div class="input-group"><label>Full Name *</label><input id="newStName" placeholder="John Doe"></div><div class="input-group"><label>Username *</label><input id="newStUser" placeholder="john.doe"></div><div class="input-group"><label>Password *</label><input type="text" id="newStPass" placeholder="password"></div><div class="input-group"><label>Email</label><input id="newStEmail" placeholder="student@example.com"></div><div class="input-group"><label>Class</label><select id="newStClass">${appData.classes.map(c => `<option value="${c.id}">${escapeHtml(c.name)}</option>`).join('')}</select></div><div style="display:flex;gap:1rem;margin-top:1rem;"><button class="btn" id="confirmAdd">💾 Save Student</button><button class="btn-outline" id="cancelAdd">Cancel</button></div></div></div>`; 
      document.getElementById('confirmAdd').onclick = () => { const name=document.getElementById('newStName').value.trim(), user=document.getElementById('newStUser').value.trim(), pass=document.getElementById('newStPass').value.trim(), email=document.getElementById('newStEmail').value.trim(), classId=document.getElementById('newStClass').value; if(!name||!user||!pass) { alert('Name, Username and Password are required'); return; } if(appData.students.some(s=>s.username===user)) { alert('Username already exists'); return; } appData.students.push({ id: generateStudentId(), name, username:user, password:pass, classId, attendance:0, fine:0, complaints:[], email, phone:'', address:'', bio:'', profilePic:'', achievements:[], totalScore:0 }); saveData(appData); showAddStudentModal=false; modalContainer.innerHTML=''; renderClassList(); renderAdminPanel(); showNotification('✅ Student added successfully!'); }; 
      document.getElementById('cancelAdd').onclick = () => { showAddStudentModal=false; modalContainer.innerHTML=''; }; 
    }
    
    function showNotification(msg, isError=false) { 
      const n = document.createElement('div'); 
      n.style.cssText = `position:fixed;bottom:20px;right:20px;background:${isError ? 'linear-gradient(135deg,#e53e3e,#c53030)' : 'linear-gradient(135deg,#48bb78,#38a169)'};color:white;padding:0.8rem 1.5rem;border-radius:2rem;z-index:10000;animation:slideInRight 0.3s ease-out;box-shadow:0 5px 20px rgba(0,0,0,0.2);`; 
      n.textContent = msg; 
      document.body.appendChild(n); 
      setTimeout(()=>n.remove(),3000); 
    }
    
    initMovableThemeToggle();
    function init() { if (!currentUser) renderLoginScreen('admin'); else renderDashboard(); }
    init();
  })();
</script>
</body>
</html>
